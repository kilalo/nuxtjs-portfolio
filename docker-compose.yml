services:
  # Service de développement
  portfolio-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nuxt-portfolio-dev
    ports:
      - "3002:3000"
      - "24678:24678" # Port pour Nuxt devtools
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
    restart: unless-stopped
    command: npm run dev

  # Service de production
  portfolio-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nuxt-portfolio-prod
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - production
